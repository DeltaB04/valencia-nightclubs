<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discotecas Valencia | Mapa Interactivo</title>
    <meta name="description" content="Descubre las mejores discotecas de Valencia. Mapa interactivo con horarios, reseñas y programación.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-container">
        <!-- Header Overlay -->
        <header class="app-header glass-panel">
            <h1 id="header-title">Valencia <span class="accent-text">Nightlife</span></h1>
            <p id="header-subtitle">Descubre tu noche perfecta</p>
        </header>

        <!-- Controls (Search & Map Style) -->
        <div class="controls-panel glass-panel">
            <div class="search-container">
                <div class="search-box">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search-input" placeholder="Buscar discoteca o género...">
                </div>
                <div id="search-results" class="search-results hidden"></div>
            </div>
            
            <div class="map-style-toggle">
                <button class="style-btn active" data-style="dark" aria-label="Modo oscuro" title="Oscuro">🌙</button>
                <button class="style-btn" data-style="light" aria-label="Modo claro" title="Claro">☀️</button>
                <button class="style-btn" data-style="satellite" aria-label="Modo satélite" title="Satélite">🛰️</button>
            </div>
        </div>

        <!-- Map Container -->
        <div id="map"></div>

        <!-- Sidebar / Details Panel -->
        <aside id="club-details" class="sidebar glass-panel hidden">
            <button id="close-sidebar" class="close-btn" aria-label="Cerrar detalles">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <div id="details-content" class="details-content">
                <!-- Content will be injected via JS -->
            </div>
        </aside>

        <!-- Floating Buttons -->
        <button id="news-btn" class="glass-panel floating-btn" title="Novedades y Eventos">
            <span class="news-icon">🔥</span>
            <span id="news-btn-text" class="news-text">Novedades</span>
        </button>

        <button id="wizard-btn" class="glass-panel floating-btn wizard-btn" title="Gustavo - Tu Asistente">
            <span class="wizard-icon">🐸</span>
            <span id="wizard-btn-text" class="wizard-text">Gustavo</span>
        </button>

        <button id="settings-btn" class="glass-panel floating-btn settings-btn" title="Ajustes">
            <span class="settings-icon">⚙️</span>
            <span id="settings-btn-text" class="settings-text">Ajustes</span>
        </button>

        <!-- Panels -->
        <div id="news-panel" class="glass-panel hidden">
            <div class="panel-header">
                <h3 id="news-panel-title">🔥 Próximos Eventos</h3>
                <button id="close-news" class="close-btn">&times;</button>
            </div>
            <div id="events-list" class="scroll-area"></div>
        </div>

        <div id="wizard-panel" class="glass-panel hidden">
            <div class="panel-header">
                <h3>🐸 Gustavo</h3>
                <button id="close-wizard" class="close-btn">&times;</button>
            </div>
            <div id="wizard-content" class="wizard-content">
                <div class="wizard-step" data-step="1">
                    <p class="wizard-question">¿Qué música te apetece hoy?</p>
                    <div class="wizard-options">
                        <button class="option-btn" data-value="Techno">Techno</button>
                        <button class="option-btn" data-value="Comercial">Comercial</button>
                        <button class="option-btn" data-value="Reggaeton">Reggaeton</button>
                        <button class="option-btn" data-value="Indie">Indie</button>
                    </div>
                </div>
                <div id="wizard-results" class="wizard-step hidden">
                    <p class="wizard-question">Tus mejores opciones:</p>
                    <div id="wizard-results-list" class="scroll-area results-list"></div>
                    <button id="restart-wizard" class="glass-btn mt-3">Empezar de nuevo</button>
                </div>
            </div>
        </div>

        <div id="settings-panel" class="glass-panel hidden">
            <div class="panel-header">
                <h3 id="settings-panel-title">⚙️ Ajustes</h3>
                <button id="close-settings" class="close-btn">&times;</button>
            </div>
            <div class="settings-content scroll-area">
                <div class="setting-item">
                    <label id="language-label" for="language-select">Idioma</label>
                    <select id="language-select" class="glass-input">
                        <option value="es">Español</option>
                        <option value="en">English</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    
    <noscript>
        <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0f172a;color:#f8fafc;font-family:sans-serif;padding:20px;text-align:center;z-index:9999;">
            <div>
                <h1>JavaScript desactivado</h1>
                <p>Esta aplicación necesita JavaScript habilitado para funcionar.</p>
            </div>
        </div>
    </noscript>

    <!-- 1. Default API key (overridden by config.local.js locally or by GitHub Actions in CI).
            The string MAPS_API_KEY_PLACEHOLDER is replaced by sed in the deploy workflow. -->
    <script>
        window.MAPS_API_KEY = 'MAPS_API_KEY_PLACEHOLDER';
    </script>

    <!-- 2. Local development config (gitignored). If present, it overrides the placeholder above.
            A 404 in production is harmless — the key just stays as the placeholder, and the
            MAPS_API_KEY secret will be injected by the deploy workflow instead. -->
    <script src="config.local.js"></script>

    <!-- 3. Static data files (must be loaded before app.js which references them) -->
    <script src="metro_data.js"></script>
    <script src="events_data.js"></script>
    <script src="data.js"></script>

    <!-- 4. App logic (defines window.initMap used by Google Maps callback) -->
    <script src="app.js"></script>

    <!-- 5. Google Maps API — loaded last so initMap is defined.
            Synchronous (no async/defer) guarantees initMap is registered before this script executes.
            A synchronous <script> tag with &callback= also means we get a clean error path via onerror. -->
    <script>
        (function loadGoogleMaps() {
            const key = (typeof window.MAPS_API_KEY === 'string' && window.MAPS_API_KEY.length > 0)
                ? window.MAPS_API_KEY
                : 'MAPS_API_KEY_PLACEHOLDER';

            const showMapError = (title, message) => {
                console.error(title, '—', message);
                const mapEl = document.getElementById('map');
                if (mapEl && !mapEl.querySelector('.map-error')) {
                    const err = document.createElement('div');
                    err.className = 'map-error';
                    err.style.cssText = 'display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;color:#f8fafc;padding:20px;text-align:center;background:#0f172a;';
                    err.innerHTML = `<h2 style="margin:0 0 12px 0;font-family:'Outfit',sans-serif;">${title}</h2><p style="margin:0 0 8px 0;max-width:520px;line-height:1.5;">${message}</p><p style="font-size:0.85rem;opacity:0.7;margin-top:16px;">Abre la consola del navegador (F12) para más detalles.</p>`;
                    mapEl.appendChild(err);
                }
            };

            if (key === 'MAPS_API_KEY_PLACEHOLDER' || key === 'YOUR_GOOGLE_MAPS_API_KEY_HERE') {
                showMapError(
                    '🔑 Falta la API key de Google Maps',
                    'La clave no está configurada. En local: crea <code>config.local.js</code> con tu key. En producción: añade el secret <code>MAPS_API_KEY</code> en GitHub → Settings → Secrets and variables → Actions.'
                );
                return;
            }

            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(key)}&libraries=geometry&callback=initMap`;
            script.onerror = () => {
                showMapError(
                    '⚠️ Google Maps no disponible',
                    'No se pudo cargar la API de Google Maps. Comprueba tu conexión a internet y que la API key tenga <strong>Maps JavaScript API</strong> y <strong>Directions API</strong> habilitadas en Google Cloud Console, y que tu dominio esté permitido en las restricciones HTTP referrers.'
                );
            };
            document.body.appendChild(script);

            // Surface authentication failures emitted via global errors
            // (e.g. InvalidKeyMapError, ApiNotActivatedMapError, RefererNotAllowedMapError)
            // so the user sees something instead of a silent blank map.
            window.addEventListener('error', (e) => {
                const msg = (e && e.message) || '';
                if (/Google Maps|InvalidKey|ApiNotActivatedMap|RefererNotAllowedMapError/i.test(msg)) {
                    showMapError('⚠️ Google Maps rechazó la clave', msg);
                }
            });
        })();
    </script>
</body>
</html>
