name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate MAPS_API_KEY secret
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          if [ -z "${MAPS_API_KEY}" ]; then
            echo "❌ ERROR: El secret MAPS_API_KEY no está configurado en GitHub." >&2
            echo "   Ve a Settings → Secrets and variables → Actions → New repository secret" >&2
            echo "   Nombre: MAPS_API_KEY  ·  Valor: tu clave de Google Maps" >&2
            exit 1
          fi
          echo "MAPS_API_KEY secret detectado ✅"

      - name: Inject API Key from secret
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          sed -i "s|MAPS_API_KEY_PLACEHOLDER|${MAPS_API_KEY}|g" index.html
          echo "API key injected from GitHub Secret ✅"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

